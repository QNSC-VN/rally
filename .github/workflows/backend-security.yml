# =============================================================================
# Security · Scan — thin caller of the shared reusable suite (qnsc-ci).
#
# One org-wide security standard: Trivy (container CVEs, CRITICAL blocks),
# Semgrep (SAST — replaces CodeQL, no GHAS needed), Gitleaks (secrets) and
# osv-scanner (dependency CVEs — replaces dependency-review). Runs on every PR,
# every push to main, and weekly to catch newly disclosed CVEs between pushes.
# =============================================================================
name: Security · Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1" # weekly Monday 04:00 UTC — catch new CVEs between pushes

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write # SARIF upload (no-op on free plan, lights up after GHAS)
  packages: read # ceiling for the reusable Trivy build to pull private @qnsc-vn/* (packages can only be reduced, not elevated, in the called workflow)

jobs:
  security:
    uses: QNSC-VN/qnsc-ci/.github/workflows/security.yml@v1.4.0
    with:
      product: rally
      image_target: api
      # Semgrep runs report-only for now: the current 23 findings are all in
      # shared infra/config (workflow action tags, dependabot/pnpm/npm supply-
      # chain hardening, pg-ssl TLS, editor sanitisation) and are being addressed
      # org-wide separately. Keep osv (dependency CVEs) blocking. Mirrors the
      # org chore/defer-semgrep-blocking decision.
      osv_blocking: true
    # security.yml declares no secrets — nothing to pass (no `secrets: inherit`).
