# =============================================================================
# Security — thin caller over the shared reusable suite in qnsc-ci.
#
# All scan logic (Trivy · Semgrep · Gitleaks · osv-scanner) lives in
# QNSC-VN/qnsc-ci/.github/workflows/security.yml so every product stays in
# lock-step. To change what/how we scan, edit the shared workflow, not here.
#
# Kept as its own workflow (not folded into ci.yml) so it can be:
#   • independently re-run (re-scan without re-running unit tests)
#   • independently required in branch protection (gate on just this check)
#   • independently scheduled (weekly, to catch newly disclosed CVEs)
# =============================================================================
name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1" # weekly Monday 04:00 UTC — catch new CVEs between pushes

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write # for SARIF upload (advisory / no-op on free plan)

jobs:
  security:
    uses: QNSC-VN/qnsc-ci/.github/workflows/security.yml@v1
    with:
      product: rally
    secrets: inherit
