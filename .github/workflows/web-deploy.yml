# =============================================================================
# Deploy — Build Vite bundle, deploy to Cloudflare Pages
#
# Triggers:
#   develop → push to main (auto)
#   prod    → push a semver tag  v*.*.*  (requires "production" environment
#             approval in GitHub Settings → Environments → production)
#
# Authentication: Cloudflare API token (Pages: Edit).
#
# Prerequisites (GitHub environments "develop" and "production"):
#   Repository secrets:
#     CLOUDFLARE_API_TOKEN     token with Pages: Edit on the account
#     CLOUDFLARE_ACCOUNT_ID    Cloudflare account ID
#     SLACK_DEPLOY_WEBHOOK     Slack / Discord incoming webhook (optional)
#
#   Environment variables:
#     PAGES_PROJECT            Cloudflare Pages project name (e.g. rally-develop-web)
#     VITE_API_URL             e.g. https://rally-api-dev.qnsc.vn
#     VITE_APP_ENV             development | production
#     VITE_ENTRA_TENANT_ID     Azure AD tenant ID (or empty to disable SSO)
#     VITE_ENTRA_CLIENT_ID     Azure AD client ID (or empty to disable SSO)
#     APP_URL                  e.g. https://rally-dev.qnsc.vn (for health)
# =============================================================================
name: Deploy — Web

on:
  push:
    branches: [main]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # semver only — no -rc suffix

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # never cancel a running deploy

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.2'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Resolve environment from the trigger.
  # ─────────────────────────────────────────────────────────────────────────
  context:
    name: Resolve context
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      environment: ${{ steps.ctx.outputs.environment }}
      asset_tag:   ${{ steps.ctx.outputs.asset_tag }}
    steps:
      - name: Determine env + tag
        id: ctx
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "asset_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=develop" >> "$GITHUB_OUTPUT"
            echo "asset_tag=sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # Build and deploy to S3 + CloudFront.
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ needs.context.outputs.environment }}
    runs-on: ubuntu-latest
    needs: context
    environment: ${{ needs.context.outputs.environment }}
    timeout-minutes: 20
    permissions:
      id-token: write   # OIDC
      contents: read

    env:
      ASSET_TAG:   ${{ needs.context.outputs.asset_tag }}
      ENVIRONMENT: ${{ needs.context.outputs.environment }}

    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        uses: QNSC-VN/qnsc-ci/actions/setup-node-pnpm@v1.5
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      # ── Build Vite bundle ─────────────────────────────────────────────────
      # All VITE_ vars are baked into the bundle at build time.
      - name: Build
        run: pnpm --filter rally-web build
        env:
          VITE_API_URL:           ${{ vars.VITE_API_URL }}
          VITE_APP_ENV:           ${{ vars.VITE_APP_ENV }}
          VITE_ENTRA_TENANT_ID:   ${{ vars.VITE_ENTRA_TENANT_ID }}
          VITE_ENTRA_CLIENT_ID:   ${{ vars.VITE_ENTRA_CLIENT_ID }}

      # ── Deploy to Cloudflare Pages ────────────────────────────────────────
      # Zero-egress static hosting with native SPA routing. wrangler uploads the
      # pre-built dist as a Pages deployment; --branch main marks it production.
      # Cloudflare handles immutable-asset caching + index.html revalidation and
      # serves the custom domain (rally-dev.qnsc.vn) with managed TLS.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy apps/web/dist
            --project-name=${{ vars.PAGES_PROJECT }}
            --branch=main

      # ── Health check — confirm the new version is serving ─────────────────
      - name: Post-deploy health check
        if: vars.APP_URL != ''
        uses: QNSC-VN/qnsc-ci/actions/post-deploy-health-check@v1.5
        with:
          url: ${{ vars.APP_URL }}
          expected-status: '200'
          timeout-seconds: '60'

      # ── Job summary ───────────────────────────────────────────────────────
      - name: Deployment summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          echo "### Deploy $STATUS — $ENVIRONMENT" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Asset tag** | \`$ASSET_TAG\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Pages project** | \`${{ vars.PAGES_PROJECT }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Actor** | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"

      # ── Notify Slack / Discord (always — even on failure) ─────────────────
      - name: Notify deploy result
        if: always()
        uses: QNSC-VN/qnsc-ci/actions/notify-deploy@v1.5
        with:
          webhook-url: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
          status: ${{ job.status == 'success' && 'success' || 'failure' }}
          service: rally-web
          environment: ${{ env.ENVIRONMENT }}
          version: ${{ env.ASSET_TAG }}
