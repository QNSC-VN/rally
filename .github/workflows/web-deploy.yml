# =============================================================================
# Web · Deploy — thin caller of the shared reusable (qnsc-ci).
#
# Triggers:
#   develop → push to main (auto)
#   prod    → push a semver tag v*.*.*  (gated by the "production" GitHub
#             Environment's required reviewer, enforced inside the reusable)
#
# The reusable builds the Vite bundle and publishes it to Cloudflare Pages.
# VITE_*/PAGES_PROJECT/APP_URL are env-scoped GitHub vars; the Cloudflare creds
# (+ optional Slack webhook) are passed explicitly to the reusable
# (least-privilege, no `secrets: inherit`).
# =============================================================================
name: Web · Deploy

on:
  push:
    branches: [main]
    # Skip the develop build+deploy when a merge touches ONLY paths this service
    # doesn't ship: docs, infra (own apply flow), and the backend (api/worker/
    # libs/db/Dockerfile/nest config). paths-ignore fires only if EVERY changed
    # file matches — a shared change (root lockfile, package.json) still deploys,
    # so under-deploy is impossible. Release tags always change package.json +
    # manifest (root, never ignored) → prod never skipped.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.claude/**'
      - 'infra/**'
      - 'apps/api/**'
      - 'apps/worker/**'
      - 'libs/**'
      - 'db/**'
      - 'Dockerfile'
      - 'nest-cli.json'
      - 'tsconfig.migrator.json'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # semver only — no -rc suffix

concurrency:
  # Serialize by ENVIRONMENT, not raw ref: all prod (tag) deploys share one
  # group so prod DB migrations never run concurrently; develop shares another.
  # prod and develop still run in parallel (different groups).
  group: deploy-web-${{ startsWith(github.ref, 'refs/tags/') && 'prod' || 'develop' }}
  cancel-in-progress: false   # never cancel a running deploy

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # CI gate — a red main must not deploy.
  #
  # Block the develop (push-to-main) deploy until the "Web · CI" run for THIS
  # commit has finished successfully. Keys on the commit sha, so it can never
  # wait on an unrelated run. Mirrors backend-deploy's wait-for-infra gate.
  #
  #   - tag push → CI does not run on tags (it triggers on push-to-main / PRs),
  #     and prod is gated by the "production" Environment reviewer inside the
  #     reusable, so there is nothing to await → proceed at once.
  #   - push to main → wait for Web · CI on this sha; `gh run watch --exit-status`
  #     propagates its conclusion, so a failed/timed-out CI blocks the deploy.
  #
  # Fails closed: if no CI run is found for the sha, block rather than ship blind.
  # ───────────────────────────────────────────────────────────────────────────
  wait-for-ci:
    name: Wait for Web · CI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Least-privilege: read the commit and query sibling runs. Nothing else.
    permissions:
      contents: read
      actions: read
    steps:
      - name: Wait for Web · CI on this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "Tag deploy — Web · CI gate not applicable."; exit 0
          fi
          # The sibling run may not be registered the instant this job starts;
          # allow a short grace period before concluding there is none.
          # This job does not check out the repo, so `gh` cannot infer it from a
          # local remote — pass it explicitly.
          for _ in $(seq 1 12); do
            ID=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow web-ci.yml \
                   --branch main --commit "$GITHUB_SHA" \
                   --limit 1 --json databaseId --jq '.[0].databaseId // empty')
            [ -n "$ID" ] && break
            sleep 10
          done
          if [ -z "${ID:-}" ]; then
            echo "::error::No Web · CI run found for $GITHUB_SHA — blocking deploy (fail closed)."
            exit 1
          fi
          echo "Waiting on Web · CI run $ID …"
          gh run watch --repo "$GITHUB_REPOSITORY" "$ID" --exit-status
          echo "Web · CI succeeded; deploy may proceed."

  deploy:
    needs: wait-for-ci
    uses: QNSC-VN/qnsc-ci/.github/workflows/web-deploy.yml@v1.4.1
    with:
      product: rally
      # Monorepo: run wrangler from the web package dir so it discovers the
      # file-based Pages Functions (apps/web/functions/**) and bundles the
      # /v1/* BFF reverse-proxy. web_dist_path is relative to working_directory.
      working_directory: apps/web
      web_dist_path: dist
    # Least-privilege: pass only what the reusable declares (no `secrets: inherit`).
    secrets:
      CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      SLACK_DEPLOY_WEBHOOK:  ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
