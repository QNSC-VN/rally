# =============================================================================
# PR Labeler — thin caller of the shared reusable (qnsc-ci). The label map
# (.github/labeler.yml) stays product-local; this only wires the plumbing.
# =============================================================================
name: PR Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: labeler-${{ github.ref }}
  cancel-in-progress: true

jobs:
  labeler:
    uses: QNSC-VN/qnsc-ci/.github/workflows/labeler.yml@v1.4.0
    permissions:
      contents: read
      pull-requests: write
