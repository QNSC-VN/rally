# =============================================================================
# PR Labeler — thin caller over the shared reusable labeler workflow.
# Logic lives in QNSC-VN/qnsc-ci/.github/workflows/labeler.yml.
# The label map (.github/labeler.yml) stays product-local.
# =============================================================================
name: PR Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: labeler-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  labeler:
    uses: QNSC-VN/qnsc-ci/.github/workflows/labeler.yml@v1
    secrets: inherit
