name: Release Commenter

on:
  release:
    types: [published]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  comment:
    uses: QNSC-VN/qnsc-ci/.github/workflows/release-commenter.yml@v1
    secrets: inherit
