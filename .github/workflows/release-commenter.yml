# =============================================================================
# Release Commenter — when a GitHub Release is published, back-comments on
# every PR merged since the previous release with the version it shipped in,
# and adds a "released: vX.Y.Z" label.
#
# This gives contributors visibility into when their work reached production,
# matching the semantic-release bot UX that teams are familiar with.
# =============================================================================
name: Release Commenter

on:
  release:
    types: [published]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  comment:
    name: Comment on merged PRs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: apexskier/github-release-commenter@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          comment-template: |
            🎉 This PR is included in **[{{ release-name }}]({{ release-html-url }})** 🎉

            The release is available on [GitHub Releases]({{ release-html-url }}).
          label-template: "released: {{ release-tag-name }}"
          create-label: true
