# =============================================================================
# CI — fast quality gates on every PR and push to main/develop
# Gate: lint → typecheck → unit tests → build → pr-title
# Security scans (Trivy, CodeQL) live in security.yml — independently runnable.
# =============================================================================
name: CI — Web

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read  # required by amannn/action-semantic-pull-request

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.2'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Lint + typecheck (fast gate — no deps needed)
  # ─────────────────────────────────────────────────────────────────────────
  quality:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - uses: QNSC-VN/qnsc-ci/actions/setup-node-pnpm@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Lint
        run: pnpm --filter rally-web lint

      - name: Typecheck
        run: pnpm --filter rally-web typecheck

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Unit tests (no DB — pure component/hook/util tests)
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      has_tests: ${{ steps.detect.outputs.has_tests }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - uses: QNSC-VN/qnsc-ci/actions/setup-node-pnpm@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Detect unit tests
        id: detect
        shell: bash
        run: |
          if find apps/web/src -type f \( -name '*.test.ts' -o -name '*.test.tsx' -o -name '*.spec.ts' -o -name '*.spec.tsx' \) | grep -q .; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Unit tests (with coverage)
        if: steps.detect.outputs.has_tests == 'true'
        run: pnpm --filter rally-web test:cov

      - name: Skip empty test suite
        if: steps.detect.outputs.has_tests != 'true'
        run: echo "No unit test files found. Skipping Vitest coverage job."

      - name: Upload coverage
        if: always() && steps.detect.outputs.has_tests == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # 3. E2E (Playwright) — full-stack flows against a live API + seeded DB.
  #    Boots Postgres + Redis, migrates + seeds, starts the API (rate limiting
  #    off so per-test login is allowed), then runs the browser specs. The
  #    Playwright config auto-starts the Vite dev server, which proxies /v1 → API.
  # ─────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rally_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      # Shared by migrate/seed, the API process, and the specs.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rally_test?sslmode=disable
      DATABASE_MIGRATION_URL: postgresql://postgres:postgres@localhost:5432/rally_test?sslmode=disable
      REDIS_URL: redis://localhost:6379
      JWT_ISSUER: rally-api
      JWT_AUDIENCE: rally-web
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 30d
      CSRF_SECRET: ci-test-csrf-secret-min-32-characters-ok
      # Rotating refresh tokens can't be shared across test contexts, so each
      # spec logs in fresh — disable rate limiting so that never 429s.
      DISABLE_RATE_LIMIT: 'true'
      # The seed's break-glass admin password the e2e helper logs in with.
      BREAKGLASS_EMAIL: admin@acme.dev
      BREAKGLASS_PASSWORD: DevAdminPass123!
      NODE_ENV: test

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - uses: QNSC-VN/qnsc-ci/actions/setup-node-pnpm@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      # Ephemeral ES256 keypair for the API (matches platform.module.ts). Test-only.
      - name: Generate CI JWT keypair
        run: |
          node - << 'EOF'
          const { generateKeyPairSync } = require('crypto');
          const { privateKey, publicKey } = generateKeyPairSync('ec', {
            namedCurve: 'P-256',
            privateKeyEncoding: { type: 'pkcs8', format: 'pem' },
            publicKeyEncoding:  { type: 'spki',  format: 'pem' },
          });
          const b64 = (s) => Buffer.from(s).toString('base64');
          const fs  = require('fs');
          fs.appendFileSync(process.env.GITHUB_ENV,
            `JWT_PRIVATE_KEY=${b64(privateKey)}\nJWT_PUBLIC_KEY=${b64(publicKey)}\n`);
          EOF

      - name: Migrate + seed database
        run: pnpm db:migrate
        env:
          SEED_ON_DEPLOY: 'true'

      - name: Build API
        run: pnpm build:api

      - name: Start API (background)
        run: |
          node --enable-source-maps dist/apps/api/apps/api/src/main.js > /tmp/api.log 2>&1 &
          echo "Waiting for API health..."
          for i in $(seq 1 40); do
            if curl -sf http://localhost:3000/v1/healthz >/dev/null 2>&1; then
              echo "API up after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "API failed to start"; cat /tmp/api.log; exit 1
        env:
          PORT: '3000'

      - name: Install Playwright browsers
        run: pnpm --filter rally-web exec playwright install --with-deps chromium

      - name: Run E2E
        run: pnpm --filter rally-web exec playwright test --reporter=line

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: playwright-report
          path: apps/web/test-results/
          retention-days: 7

      - name: API logs on failure
        if: failure()
        run: cat /tmp/api.log || true

  # ─────────────────────────────────────────────────────────────────────────
  # 4. Vite build — verifies the production bundle compiles cleanly.
  #    Publishes the dist as an artifact for the deploy job to consume.
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, test]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - uses: QNSC-VN/qnsc-ci/actions/setup-node-pnpm@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Build
        run: pnpm --filter rally-web build

      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 3

  # ─────────────────────────────────────────────────────────────────────────
  # 4. PR title — enforce Conventional Commits format on PR titles.
  #    Required because release-please derives CHANGELOG from PR titles.
  # ─────────────────────────────────────────────────────────────────────────
  pr-title:
    name: PR title (conventional commits)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50  # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            style
            refactor
            perf
            security
            test
            build
            ci
            deps
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" must start with a lowercase letter.

  # Security scans (Trivy, CodeQL) → security.yml
