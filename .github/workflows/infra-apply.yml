name: OpenTofu Apply

# ─────────────────────────────────────────────────────────────────────────────
# Infra apply, gated the same way as the app deploys (backend-deploy.yml):
#   push to main       → apply _shared + develop  (auto)
#   push a v*.*.* tag  → apply _shared + prod      (prod also gated by the
#                        "production" GitHub Environment's required reviewer)
#
# Prod infra can NOT be applied by a normal merge to main — it only happens on
# a deliberate semver tag, so an accidental push can never touch production.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
    paths:
      - "infra/live/**"
      - ".github/workflows/infra-apply.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TOFU_VERSION: "1.9.1"
  AWS_REGION: ap-southeast-1

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Shared (ECR + OIDC roles) — always applies first (both branch and tag runs).
  # ─────────────────────────────────────────────────────────────────────────────
  apply-shared:
    runs-on: ubuntu-latest
    environment: shared
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

      - uses: QNSC-VN/qnsc-ci/actions/setup-tofu-aws@v1.5
        with:
          role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/rally-github-infra-apply
          aws-region: ${{ env.AWS_REGION }}
          tofu-version: ${{ env.TOFU_VERSION }}

      - name: Configure git for public modules
        run: git config --global url."https://github.com".insteadOf "https://github.com"

      - name: tofu init
        working-directory: infra/live/_shared
        run: tofu init -input=false

      - name: tofu validate
        working-directory: infra/live/_shared
        run: tofu validate

      - name: tofu apply
        working-directory: infra/live/_shared
        run: tofu apply -input=false -auto-approve

  # ─────────────────────────────────────────────────────────────────────────────
  # Develop — only on a branch push to main (NOT on tag pushes).
  # ─────────────────────────────────────────────────────────────────────────────
  apply-develop:
    needs: apply-shared
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    environment: develop   # no approval gate
    timeout-minutes: 45
    env:
      # Optional PAT (classic "repo" scope, or fine-grained with Variables:write
      # on this repo) used only to sync infra IDs into the develop environment
      # variables below. If unset, that step is skipped and vars stay manual.
      GH_VARS_TOKEN: ${{ secrets.GH_VARS_TOKEN }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

      - uses: QNSC-VN/qnsc-ci/actions/setup-tofu-aws@v1.5
        with:
          role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/rally-github-infra-apply
          aws-region: ${{ env.AWS_REGION }}
          tofu-version: ${{ env.TOFU_VERSION }}

      - name: Configure git for public modules
        run: git config --global url."https://github.com".insteadOf "https://github.com"

      - name: tofu init
        working-directory: infra/live/develop
        run: tofu init -input=false

      - name: tofu validate
        working-directory: infra/live/develop
        run: tofu validate

      - name: tofu apply
        working-directory: infra/live/develop
        run: tofu apply -input=false -auto-approve
        env:
          TF_VAR_acm_cert_arn:       ${{ vars.ACM_CERT_ARN_DEVELOP }}
          TF_VAR_web_acm_cert_arn:   ${{ vars.WEB_ACM_CERT_ARN_DEVELOP }}
          TF_VAR_entra_tenant_id:    ${{ vars.ENTRA_TENANT_ID }}
          TF_VAR_entra_client_id:    ${{ vars.ENTRA_CLIENT_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # Sync the infra IDs the deploy workflows read (backend-deploy.yml,
      # web-deploy.yml) straight from Terraform outputs, so a rebuild that
      # changes subnet/SG/CloudFront IDs can never leave the vars stale.
      # Skipped automatically when GH_VARS_TOKEN isn't configured.
      - name: Publish infra IDs to develop environment variables
        if: ${{ env.GH_VARS_TOKEN != '' }}
        working-directory: infra/live/develop
        env:
          GH_TOKEN: ${{ env.GH_VARS_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          set_var() { echo "  set ${1}"; gh variable set "$1" --env develop --repo "$REPO" --body "$2"; }
          set_var ECS_CLUSTER           "$(tofu output -raw ecs_cluster_name)"
          set_var ECS_API_SERVICE       "$(tofu output -raw ecs_api_service)"
          set_var ECS_WORKER_SERVICE    "$(tofu output -raw ecs_worker_service)"
          set_var ECS_MIGRATOR_TASK_DEF "$(tofu output -raw ecs_migrator_task_def)"
          set_var ECS_MIGRATOR_SUBNET   "$(tofu output -json private_subnet_ids | jq -r 'join(",")')"
          set_var ECS_MIGRATOR_SG       "$(tofu output -raw sg_app_id)"
          set_var CLOUDFRONT_ID         "$(tofu output -raw web_cloudfront_id)"
          set_var S3_BUCKET             "$(tofu output -raw web_s3_bucket)"

  # ─────────────────────────────────────────────────────────────────────────────
  # Production — only on a v*.*.* tag push, AND requires manual approval via the
  # "production" GitHub Environment (configure a required reviewer there).
  # ─────────────────────────────────────────────────────────────────────────────
  apply-prod:
    needs: apply-shared
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

      - uses: QNSC-VN/qnsc-ci/actions/setup-tofu-aws@v1.5
        with:
          role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/rally-github-infra-apply
          aws-region: ${{ env.AWS_REGION }}
          tofu-version: ${{ env.TOFU_VERSION }}

      - name: Configure git for public modules
        run: git config --global url."https://github.com".insteadOf "https://github.com"

      - name: tofu init
        working-directory: infra/live/prod
        run: tofu init -input=false

      - name: tofu validate
        working-directory: infra/live/prod
        run: tofu validate

      - name: tofu apply
        working-directory: infra/live/prod
        run: tofu apply -input=false -auto-approve
        env:
          TF_VAR_acm_cert_arn:       ${{ secrets.ACM_CERT_ARN_PROD }}
          TF_VAR_web_acm_cert_arn:   ${{ secrets.WEB_ACM_CERT_ARN_PROD }}
          TF_VAR_entra_tenant_id:    ${{ vars.ENTRA_TENANT_ID }}
          TF_VAR_entra_client_id:    ${{ vars.ENTRA_CLIENT_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_web_domain:           ${{ vars.RALLY_WEB_DOMAIN_PROD }}
