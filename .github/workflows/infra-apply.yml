name: Infrastructure · Apply

# ─────────────────────────────────────────────────────────────────────────────
# Infra apply, gated the same way as the app deploys (backend-deploy.yml):
#   push to main       → apply _shared + develop  (auto)
#   push a v*.*.* tag  → apply _shared + prod      (prod also gated by the
#                        "production" GitHub Environment's required reviewer)
#
# Prod infra can NOT be applied by a normal merge to main — it only happens on
# a deliberate semver tag, so an accidental push can never touch production.
#
# PREREQUISITE (Option A shared runtime): the platform shared-runtime stacks in
# qnsc-infra — runtime-dev (for develop) and runtime-prod (for prod) — own the
# shared VPC/NAT/ALB (+ prod cache/WAF) and MUST be applied before this product
# stack. develop/prod consume them via terraform_remote_state, so a product
# apply fails if the runtime state doesn't exist yet. The platform pipeline
# applies runtime first.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
    paths:
      - "infra/live/**"
      - ".github/workflows/infra-apply.yml"
  workflow_dispatch:

# Serialize ALL infra applies for this repo (constant group, NOT keyed on
# github.ref). Merging a release PR pushes main AND creates the vX.Y.Z tag
# near-simultaneously; both runs execute apply-shared against the same
# infra/live/_shared state. A ref-keyed group put them in different groups →
# concurrent tofu apply → state-lock failure on every release. One group makes
# the tag run queue behind the branch run. Never cancel a running apply.
concurrency:
  group: infra-apply-${{ github.repository }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  TOFU_VERSION: "1.9.1"
  AWS_REGION: ap-southeast-1

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Shared (ECR + OIDC roles) — always applies first (both branch and tag runs).
  # ─────────────────────────────────────────────────────────────────────────────
  apply-shared:
    runs-on: ubuntu-latest
    environment: shared
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

      - uses: QNSC-VN/qnsc-ci/actions/setup-tofu-aws@v1.3.3
        with:
          role-arn: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/rally-github-infra-apply
          aws-region: ${{ env.AWS_REGION }}
          tofu-version: ${{ env.TOFU_VERSION }}

      - name: tofu init
        working-directory: infra/live/_shared
        run: tofu init -input=false

      - name: tofu validate
        working-directory: infra/live/_shared
        run: tofu validate

      - name: tofu apply
        working-directory: infra/live/_shared
        run: tofu apply -input=false -auto-approve

  # ─────────────────────────────────────────────────────────────────────────────
  # Develop — only on a branch push to main (NOT on tag pushes).
  # ─────────────────────────────────────────────────────────────────────────────
  apply-develop:
    needs: apply-shared
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    environment: develop   # no approval gate
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

      - uses: QNSC-VN/qnsc-ci/actions/setup-tofu-aws@v1.3.3
        with:
          role-arn: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/rally-github-infra-apply
          aws-region: ${{ env.AWS_REGION }}
          tofu-version: ${{ env.TOFU_VERSION }}

      - name: tofu init
        working-directory: infra/live/develop
        run: tofu init -input=false

      - name: tofu validate
        working-directory: infra/live/develop
        run: tofu validate

      - name: tofu apply
        working-directory: infra/live/develop
        run: tofu apply -input=false -auto-approve
        env:
          TF_VAR_entra_tenant_id:    ${{ vars.ENTRA_TENANT_ID }}
          TF_VAR_entra_client_id:    ${{ vars.ENTRA_CLIENT_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      # Mint a short-lived installation token from the RELEASE_BOT GitHub App
      # (same app release.yml uses) so we never need a long-lived user PAT.
      # Requires the app to have "Variables: read and write" on this repo.
      # Falls back to no token (publish step skipped) when the app isn't set.
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3
        id: app-token
        if: ${{ vars.RELEASE_BOT_APP_ID != '' }}
        continue-on-error: true
        with:
          app-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      # Sync the infra IDs the deploy workflows read (backend-deploy.yml)
      # straight from Terraform outputs, so a rebuild that changes subnet/SG
      # IDs can never leave the vars stale.
      # Skipped automatically when no app token could be minted. A write may be
      # rejected on a protected environment (App installation tokens cannot
      # write vars to an env with required reviewers) — we surface that as a
      # visible ::warning:: (never a silent green) but never block the apply.
      - name: Publish infra IDs to develop environment variables
        if: ${{ steps.app-token.outputs.token != '' }}
        working-directory: infra/live/develop
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          missed=0
          set_var() {
            if gh variable set "$1" --env develop --repo "$REPO" --body "$2"; then
              echo "  set $1"
            else
              echo "::warning title=infra-id publish::could not set '$1' on the develop environment — reconcile manually: gh variable set $1 --env develop --repo $REPO --body '$2'"
              missed=1
            fi
          }
          set_var ECS_CLUSTER           "$(tofu output -raw ecs_cluster_name)"
          set_var ECS_API_SERVICE       "$(tofu output -raw ecs_api_service)"
          set_var ECS_WORKER_SERVICE    "$(tofu output -raw ecs_worker_service)"
          set_var ECS_MIGRATOR_TASK_DEF "$(tofu output -raw ecs_migrator_task_def)"
          set_var ECS_MIGRATOR_SUBNET   "$(tofu output -json private_subnet_ids | jq -r 'join(",")')"
          set_var ECS_MIGRATOR_SG       "$(tofu output -raw sg_app_id)"
          set_var PAGES_PROJECT         "$(tofu output -raw web_pages_project)"
          if [[ $missed -ne 0 ]]; then
            echo "::warning title=infra-id publish::One or more develop infra-ID vars were not auto-published — the deploy reads these, so verify they match Terraform outputs to avoid drift."
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Production — only on a v*.*.* tag push, AND requires manual approval via the
  # "production" GitHub Environment (configure a required reviewer there).
  # ─────────────────────────────────────────────────────────────────────────────
  apply-prod:
    needs: apply-shared
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

      - uses: QNSC-VN/qnsc-ci/actions/setup-tofu-aws@v1.3.3
        with:
          role-arn: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/rally-github-infra-apply
          aws-region: ${{ env.AWS_REGION }}
          tofu-version: ${{ env.TOFU_VERSION }}

      - name: tofu init
        working-directory: infra/live/prod
        run: tofu init -input=false

      - name: tofu validate
        working-directory: infra/live/prod
        run: tofu validate

      - name: tofu apply
        working-directory: infra/live/prod
        run: tofu apply -input=false -auto-approve
        env:
          TF_VAR_entra_tenant_id:    ${{ vars.ENTRA_TENANT_ID }}
          TF_VAR_entra_client_id:    ${{ vars.ENTRA_CLIENT_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          # Pin the prod image to the exact release tag that triggered this apply
          # (e.g. v1.4.2), so an infra apply never resets the task def to :latest.
          TF_VAR_image_tag:            ${{ github.ref_name }}

      # Mint a short-lived installation token from the RELEASE_BOT GitHub App so
      # we never need a long-lived user PAT. Requires the app to have
      # "Variables: read and write" on this repo. Falls back to no token
      # (publish step skipped) when the app isn't configured.
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3
        id: app-token
        if: ${{ vars.RELEASE_BOT_APP_ID != '' }}
        continue-on-error: true
        with:
          app-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      # Sync the infra IDs the deploy workflows read (backend-deploy.yml) straight
      # from Terraform outputs into the production environment, so a rebuild that
      # changes subnet/SG IDs can never leave the prod vars stale.
      #
      # NOTE: `production` is a PROTECTED environment (required reviewers), and a
      # GitHub App installation token cannot write variables to a protected
      # environment (403 "Resource not accessible by integration"). When that
      # happens we emit a visible ::warning:: naming each var to reconcile —
      # never a silent green — but we do not block the apply. The prod infra IDs
      # are deterministic and stable, so the vars persist between applies; a
      # human reconciles them on the rare infra rebuild that changes an ID.
      - name: Publish infra IDs to production environment variables
        if: ${{ steps.app-token.outputs.token != '' }}
        working-directory: infra/live/prod
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          missed=0
          set_var() {
            if gh variable set "$1" --env production --repo "$REPO" --body "$2"; then
              echo "  set $1"
            else
              echo "::warning title=infra-id publish::could not set '$1' on the production environment (a protected env rejects App-token writes) — reconcile manually: gh variable set $1 --env production --repo $REPO --body '$2'"
              missed=1
            fi
          }
          set_var ECS_CLUSTER           "$(tofu output -raw ecs_cluster_name)"
          set_var ECS_API_SERVICE       "$(tofu output -raw ecs_api_service)"
          set_var ECS_WORKER_SERVICE    "$(tofu output -raw ecs_worker_service)"
          set_var ECS_MIGRATOR_TASK_DEF "$(tofu output -raw ecs_migrator_task_def)"
          set_var ECS_MIGRATOR_SUBNET   "$(tofu output -json private_subnet_ids | jq -r 'join(",")')"
          set_var ECS_MIGRATOR_SG       "$(tofu output -raw sg_app_id)"
          set_var PAGES_PROJECT         "$(tofu output -raw web_pages_project)"
          if [[ $missed -ne 0 ]]; then
            echo "::warning title=infra-id publish::One or more production infra-ID vars were not auto-published — the deploy reads these, so verify they match Terraform outputs to avoid drift."
          fi
