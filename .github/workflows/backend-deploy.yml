# =============================================================================
# Backend · Deploy — thin caller of the shared reusable (qnsc-ci).
#
# Triggers:
#   develop → push to main (auto)
#   prod    → push a semver tag v*.*.*  (gated by the "production" GitHub
#             Environment's required reviewer, enforced inside the reusable)
#
# The reusable builds/attests on main, promotes the exact dev image on tag,
# migrates, then rolls the ECS services. All ECS_*/RDS/APP_URL config is read
# from env-scoped GitHub vars; only the AWS account id (+ optional Slack webhook)
# are passed explicitly to the reusable (least-privilege, no `secrets: inherit`).
# =============================================================================
name: Backend · Deploy

on:
  push:
    branches: [main]
    # Skip the develop build+deploy when a merge touches ONLY paths this service
    # doesn't ship: docs, infra (own apply flow), and the web app. paths-ignore
    # fires only if EVERY changed file matches — a shared change (libs, db, root
    # lockfile) still deploys, so under-deploy is impossible. Release tags always
    # change package.json + manifest (root, never ignored) → prod never skipped.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.claude/**'
      - 'infra/**'
      - 'apps/web/**'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # semver only — no -rc suffix

concurrency:
  # Serialize by ENVIRONMENT, not raw ref: all prod (tag) deploys share one
  # group so prod DB migrations never run concurrently; develop shares another.
  # prod and develop still run in parallel (different groups).
  group: deploy-backend-${{ startsWith(github.ref, 'refs/tags/') && 'prod' || 'develop' }}
  cancel-in-progress: false   # never cancel a running deploy

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Ordering gate — never roll the app ahead of its own infrastructure.
  #
  # Backend·Deploy and Infrastructure·Apply both fire on the same push, as
  # independent workflows. Nothing sequenced them, so a commit that changes BOTH
  # infra and app code raced: the deploy registered/ran tasks against the OLD
  # task definition while the new one was still being applied.
  #
  # That is how the DATABASE_USER/PASSWORD migration would have failed — the
  # migrator would have run with the previous task definition, still pointing at
  # the retired db-url secret, and reported a confusing auth error.
  #
  # Deterministic by design:
  #   - commit does NOT touch infra/live/** → no infra run exists, proceed at once
  #   - commit DOES touch infra/live/**     → wait for that run on THIS sha
  # It keys on the commit sha, so it can never wait on an unrelated run.
  # ───────────────────────────────────────────────────────────────────────────
  wait-for-infra:
    name: Wait for infrastructure
    runs-on: ubuntu-latest
    # Generous: on a tag this waits for apply-prod, which sits behind the
    # `production` environment's required reviewer. Timing out here is safe —
    # the deploy is re-runnable — but it should not fire just because an
    # approver stepped away.
    timeout-minutes: 120
    # Least-privilege: read the commit and query sibling runs. Nothing else.
    # Explicit so an org-level default change cannot silently break the gate.
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 2

      - name: Does this commit change infrastructure?
        id: touched
        run: |
          # Tags ALWAYS gate. infra-apply's apply-prod job is `if: ref_type ==
          # 'tag'`, so a tag is the ONLY thing that applies prod infra — and the
          # prod deploy fires on the same tag. Without gating here they race, and
          # the prod migrator runs against the PREVIOUS task definition. Path
          # filters are also not applied to tag pushes, so infra-apply always
          # runs for a tag regardless of what the commit touched.
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "infra=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if git diff --name-only HEAD~1 HEAD | grep -q '^infra/live/'; then
            echo "infra=true" >> "$GITHUB_OUTPUT"
          else
            echo "infra=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for Infrastructure · Apply on this commit
        if: steps.touched.outputs.infra == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # The sibling run may not be registered the instant this job starts;
          # allow a short grace period before concluding there is none.
          for _ in $(seq 1 12); do
            ID=$(gh run list --workflow=infra-apply.yml --commit "$GITHUB_SHA" \
                   --limit 1 --json databaseId --jq '.[0].databaseId // empty')
            [ -n "$ID" ] && break
            sleep 10
          done

          if [ -z "${ID:-}" ]; then
            echo "::warning::infra/live changed but no Infrastructure · Apply run found for $GITHUB_SHA — proceeding."
            exit 0
          fi

          echo "Waiting on infra-apply run $ID …"
          gh run watch "$ID" --exit-status
          echo "Infrastructure applied; deploy may proceed."

  # ───────────────────────────────────────────────────────────────────────────
  # CI gate — a red main must not deploy.
  #
  # Block the develop (push-to-main) deploy until the "Backend · CI" run for THIS
  # commit has finished successfully. Keys on the commit sha, so it can never
  # wait on an unrelated run. Same shape as wait-for-infra above.
  #
  #   - tag push → CI does not run on tags, and prod is gated by the "production"
  #     Environment reviewer inside the reusable → nothing to await, proceed.
  #   - push to main → wait for Backend · CI on this sha; `gh run watch
  #     --exit-status` propagates its conclusion, so a failed CI blocks deploy.
  #
  # Fails closed: if no CI run is found for the sha, block rather than ship blind.
  # ───────────────────────────────────────────────────────────────────────────
  wait-for-ci:
    name: Wait for Backend · CI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read
    steps:
      - name: Wait for Backend · CI on this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "Tag deploy — Backend · CI gate not applicable."; exit 0
          fi
          for _ in $(seq 1 12); do
            ID=$(gh run list --workflow backend-ci.yml --branch main --commit "$GITHUB_SHA" \
                   --limit 1 --json databaseId --jq '.[0].databaseId // empty')
            [ -n "$ID" ] && break
            sleep 10
          done
          if [ -z "${ID:-}" ]; then
            echo "::error::No Backend · CI run found for $GITHUB_SHA — blocking deploy (fail closed)."
            exit 1
          fi
          echo "Waiting on Backend · CI run $ID …"
          gh run watch "$ID" --exit-status
          echo "Backend · CI succeeded; deploy may proceed."

  deploy:
    needs: [wait-for-infra, wait-for-ci]
    uses: QNSC-VN/qnsc-ci/.github/workflows/backend-deploy.yml@v1.4.0
    with:
      product: rally
      has_worker: true
      has_migrator: true
    # Least-privilege: pass only what the reusable declares (no `secrets: inherit`).
    secrets:
      AWS_ACCOUNT_ID:       ${{ vars.AWS_ACCOUNT_ID }}
      SLACK_DEPLOY_WEBHOOK: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
