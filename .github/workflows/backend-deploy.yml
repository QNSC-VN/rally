# =============================================================================
# Deploy — Build, attest, migrate, then update ECS services
#
# Triggers:
#   develop → push to main (auto)
#   prod    → push a semver tag  v*.*.*  (requires "production" environment
#             approval in GitHub Settings → Environments → production)
#
# Image promotion:
#   main push  → Docker build → push as sha-<sha>  → deploy develop
#   v*.*.* tag → retag sha-<sha> as vX.Y.Z (no rebuild) → deploy prod
#   Prod always deploys the exact binary tested in develop.
#
# Authentication: GitHub OIDC → AWS IAM (no stored AWS keys).
#
# Prerequisites (GitHub environments "develop" and "production"):
#   Repository secrets:
#     AWS_ACCOUNT_ID           12-digit, no hyphens
#     RELEASE_BOT_APP_ID       GitHub App ID (org var) — used by release.yml, not this workflow
#     SLACK_DEPLOY_WEBHOOK     Slack / Discord incoming webhook (optional)
#
#   Environment variables:
#     AWS_REGION               e.g. ap-southeast-1
#     ECS_CLUSTER              e.g. rally-develop
#     ECS_API_SERVICE          e.g. api
#     ECS_WORKER_SERVICE       e.g. worker
#     ECS_MIGRATOR_TASK_DEF    e.g. rally-develop-migrator
#     ECS_MIGRATOR_SUBNET      private subnet ID (comma-separated if multiple)
#     ECS_MIGRATOR_SG          security group allowing outbound to RDS
#     API_URL                  e.g. https://rally-api-dev.qnsc.vn (backend health check; /v1/healthz is appended)
#
#   Environment-scoped IAM roles (provisioned by rally-infra):
#     rally-github-ecr-push        build-push job (ECR push + retag)
#     rally-github-deploy-<env>    deploy job (ECS + task-def registration)
# =============================================================================
name: Deploy — Backend

on:
  push:
    branches: [main]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # semver only — no -rc suffix

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # never cancel a running deploy

permissions:
  contents: read

env:
  GITOPS_SHA: v1.4

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Resolve environment, image tag, and source tag from the trigger.
  #   source_tag  — sha-xxx always (the dev build to retag or deploy)
  #   image_tag   — sha-xxx for dev, vX.Y.Z for prod (what ECS uses)
  # ─────────────────────────────────────────────────────────────────────────
  context:
    name: Resolve context
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      environment: ${{ steps.ctx.outputs.environment }}
      image_tag:   ${{ steps.ctx.outputs.image_tag }}
      source_tag:  ${{ steps.ctx.outputs.source_tag }}
    steps:
      - name: Determine env + tag
        id: ctx
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "source_tag=sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=develop" >> "$GITHUB_OUTPUT"
            echo "image_tag=sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "source_tag=sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # Build & push (main) or promote image (tag).
  #   main push  → Docker build → push sha-xxx + latest
  #   v*.*.* tag → retag sha-xxx as vX.Y.Z in ECR (no Docker build)
  # ─────────────────────────────────────────────────────────────────────────
  build-push:
    name: ${{ github.ref_type == 'tag' && 'Promote image to ECR' || 'Build & push to ECR' }}
    runs-on: ubuntu-latest
    needs: context
    timeout-minutes: 45
    permissions:
      id-token: write       # OIDC — assume ECR push role
      contents: read
      attestations: write   # SLSA provenance attestation

    env:
      IMAGE_TAG:  ${{ needs.context.outputs.image_tag }}
      SOURCE_TAG: ${{ needs.context.outputs.source_tag }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup AWS OIDC + ECR login
        id: aws
        uses: QNSC-VN/qnsc-ci/actions/setup-aws-oidc@v1
        with:
          role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/rally-github-ecr-push
          region: ${{ vars.AWS_REGION }}
          ecr-login: 'true'

      # ── PROMOTE PATH (tag triggers only — retag sha → semver, no rebuild) ─
      # Prod deploys the exact binary tested in develop. No new build.
      - name: Promote images ${{ env.SOURCE_TAG }} → ${{ env.IMAGE_TAG }}
        if: github.ref_type == 'tag'
        uses: QNSC-VN/qnsc-ci/actions/promote-ecr-images@v1
        with:
          image-names: rally-api,rally-worker,rally-migrator
          source-tag:  ${{ env.SOURCE_TAG }}
          release-tag: ${{ env.IMAGE_TAG }}
          region:      ${{ vars.AWS_REGION }}

      # ── BUILD PATH (main push only) ───────────────────────────────────────
      - name: Build & push API image
        if: github.ref_type != 'tag'
        id: build-api
        uses: QNSC-VN/qnsc-ci/actions/build-push-ecr@v1
        with:
          ecr-registry: ${{ steps.aws.outputs.ecr-registry }}
          image-name: rally-api
          image-tag: ${{ env.IMAGE_TAG }}
          extra-tags: latest
          build-target: api
          cache-scope: api

      - name: Scan API image for critical CVEs
        if: github.ref_type != 'tag'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ steps.aws.outputs.ecr-registry }}/rally-api:${{ env.IMAGE_TAG }}'
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      - name: Attest API image (SLSA provenance)
        if: github.ref_type != 'tag'
        continue-on-error: true # requires GitHub Advanced Security or public repo
        uses: QNSC-VN/qnsc-ci/actions/attest-image@v1
        with:
          image-ref: ${{ steps.aws.outputs.ecr-registry }}/rally-api@${{ steps.build-api.outputs.image-digest }}

      - name: Build & push Worker image
        if: github.ref_type != 'tag'
        id: build-worker
        uses: QNSC-VN/qnsc-ci/actions/build-push-ecr@v1
        with:
          ecr-registry: ${{ steps.aws.outputs.ecr-registry }}
          image-name: rally-worker
          image-tag: ${{ env.IMAGE_TAG }}
          extra-tags: latest
          build-target: worker
          cache-scope: worker

      - name: Scan Worker image for critical CVEs
        if: github.ref_type != 'tag'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ steps.aws.outputs.ecr-registry }}/rally-worker:${{ env.IMAGE_TAG }}'
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      - name: Attest Worker image (SLSA provenance)
        if: github.ref_type != 'tag'
        continue-on-error: true # requires GitHub Advanced Security or public repo
        uses: QNSC-VN/qnsc-ci/actions/attest-image@v1
        with:
          image-ref: ${{ steps.aws.outputs.ecr-registry }}/rally-worker@${{ steps.build-worker.outputs.image-digest }}

      - name: Build & push Migrator image
        if: github.ref_type != 'tag'
        id: build-migrator
        uses: QNSC-VN/qnsc-ci/actions/build-push-ecr@v1
        with:
          ecr-registry: ${{ steps.aws.outputs.ecr-registry }}
          image-name: rally-migrator
          image-tag: ${{ env.IMAGE_TAG }}
          extra-tags: latest
          build-target: migrator
          cache-scope: migrator

      - name: Scan Migrator image for critical CVEs
        if: github.ref_type != 'tag'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ steps.aws.outputs.ecr-registry }}/rally-migrator:${{ env.IMAGE_TAG }}'
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      - name: Attest Migrator image (SLSA provenance)
        if: github.ref_type != 'tag'
        continue-on-error: true # requires GitHub Advanced Security or public repo
        uses: QNSC-VN/qnsc-ci/actions/attest-image@v1
        with:
          image-ref: ${{ steps.aws.outputs.ecr-registry }}/rally-migrator@${{ steps.build-migrator.outputs.image-digest }}

  # ─────────────────────────────────────────────────────────────────────────
  # Deploy to the resolved environment (gated by GitHub Environment rules).
  # "production" has required manual reviewers — set in Settings → Environments.
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy (${{ needs.context.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [context, build-push]
    environment: ${{ needs.context.outputs.environment }}
    timeout-minutes: 30
    permissions:
      id-token: write   # OIDC — assume deploy role
      contents: read

    env:
      IMAGE_TAG:   ${{ needs.context.outputs.image_tag }}
      ENVIRONMENT: ${{ needs.context.outputs.environment }}
      ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup AWS OIDC (deploy role)
        uses: QNSC-VN/qnsc-ci/actions/setup-aws-oidc@v1
        with:
          role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/rally-github-deploy-${{ env.ENVIRONMENT }}
          region: ${{ vars.AWS_REGION }}

      # ── Step 1: Update task definitions to pin the exact image tag ────────
      - name: Update API task definition to ${{ env.IMAGE_TAG }}
        id: api-taskdef
        run: |
          TASK_DEF_FAMILY="${{ vars.ECS_CLUSTER }}-${{ vars.ECS_API_SERVICE }}"
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$TASK_DEF_FAMILY" \
            --query 'taskDefinition' --output json)

          NEW_DEF=$(echo "$TASK_DEF" | python3 -c "
          import sys, json, os
          td = json.load(sys.stdin)
          tag = os.environ['IMAGE_TAG']
          for c in td.get('containerDefinitions', []):
              if c.get('name') == 'api':
                  repo = c['image'].rsplit(':', 1)[0]
                  c['image'] = f'{repo}:{tag}'
          for f in ['taskDefinitionArn','revision','status','requiresAttributes',
                    'placementConstraints','compatibilities','registeredAt','registeredBy']:
              td.pop(f, None)
          print(json.dumps(td))
          ")

          ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "arn=$ARN" >> "$GITHUB_OUTPUT"
          echo "Registered: $ARN"

      - name: Update Worker task definition to ${{ env.IMAGE_TAG }}
        id: worker-taskdef
        run: |
          TASK_DEF_FAMILY="${{ vars.ECS_CLUSTER }}-${{ vars.ECS_WORKER_SERVICE }}"
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$TASK_DEF_FAMILY" \
            --query 'taskDefinition' --output json)

          NEW_DEF=$(echo "$TASK_DEF" | python3 -c "
          import sys, json, os
          td = json.load(sys.stdin)
          tag = os.environ['IMAGE_TAG']
          for c in td.get('containerDefinitions', []):
              if c.get('name') == 'worker':
                  repo = c['image'].rsplit(':', 1)[0]
                  c['image'] = f'{repo}:{tag}'
          for f in ['taskDefinitionArn','revision','status','requiresAttributes',
                    'placementConstraints','compatibilities','registeredAt','registeredBy']:
              td.pop(f, None)
          print(json.dumps(td))
          ")

          ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "arn=$ARN" >> "$GITHUB_OUTPUT"

      # ── Step 2: Wake the dev environment (RDS + ECS) before migrations ────
      # The dev cost-saver scheduler stops RDS and scales ECS services to 0 at
      # 20:00 ICT (restores at 08:00 ICT). A deploy that runs while the env is
      # asleep would otherwise (a) time out on the DB and (b) start zero tasks,
      # so the verify step would never see the new image. This step starts RDS
      # (waits up to 8 min) and scales any service at desiredCount=0 back to 1.
      # On prod this is a no-op: RDS is Multi-AZ (never stopped) and services
      # are never scaled to 0.
      - name: Ensure dev environment is awake (RDS + ECS)
        if: env.ENVIRONMENT == 'develop'
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          RDS_IDENTIFIER: ${{ vars.RDS_INSTANCE_ID }}
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
          ECS_API_SERVICE: ${{ vars.ECS_API_SERVICE }}
          ECS_WORKER_SERVICE: ${{ vars.ECS_WORKER_SERVICE }}
        run: |
          # ── RDS: start if the cost-saver stopped it, then wait for available ──
          ensure_rds() {
            local status
            status=$(aws rds describe-db-instances \
              --db-instance-identifier "$RDS_IDENTIFIER" --region "$AWS_REGION" \
              --query 'DBInstances[0].DBInstanceStatus' --output text 2>/dev/null || echo "not-found")
            echo "RDS status: $status"
            [ "$status" = "available" ] && return 0
            if [ "$status" = "stopped" ]; then
              echo "RDS is stopped — starting it now..."
              aws rds start-db-instance \
                --db-instance-identifier "$RDS_IDENTIFIER" --region "$AWS_REGION" >/dev/null \
                || echo "::warning::start-db-instance failed; will keep polling in case another actor started it"
            fi
            echo "Waiting for RDS to become available (timeout: 8 min)..."
            for i in $(seq 1 32); do
              sleep 15
              status=$(aws rds describe-db-instances \
                --db-instance-identifier "$RDS_IDENTIFIER" --region "$AWS_REGION" \
                --query 'DBInstances[0].DBInstanceStatus' --output text 2>/dev/null || echo "unknown")
              echo "  [${i}/32] RDS: $status"
              [ "$status" = "available" ] && { echo "RDS is available."; return 0; }
            done
            echo "Timed out waiting for RDS after 8 minutes."
            return 1
          }
          ensure_rds

          # ── ECS: restore any service the cost-saver scaled to 0, otherwise the
          #    deploy starts no tasks and the verify step times out. ──
          for SVC in "$ECS_API_SERVICE" "$ECS_WORKER_SERVICE"; do
            [ -z "$SVC" ] && continue
            desired=$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" --services "$SVC" --region "$AWS_REGION" \
              --query 'services[0].desiredCount' --output text 2>/dev/null || echo "0")
            if [ "$desired" = "0" ]; then
              echo "ECS $SVC is scaled to 0 (cost-saver) — scaling up to 1"
              aws ecs update-service --cluster "$ECS_CLUSTER" --service "$SVC" \
                --desired-count 1 --region "$AWS_REGION" >/dev/null
            else
              echo "ECS $SVC desiredCount=$desired — no scale-up needed"
            fi
          done

      # ── Step 3: Run migrations BEFORE any traffic shifts ─────────────────
      - name: Run database migrations
        uses: QNSC-VN/qnsc-ci/actions/run-db-migration@v1
        with:
          cluster: ${{ vars.ECS_CLUSTER }}
          task-definition: ${{ vars.ECS_MIGRATOR_TASK_DEF }}
          subnet-ids: ${{ vars.ECS_MIGRATOR_SUBNET }}
          security-group-ids: ${{ vars.ECS_MIGRATOR_SG }}
          region: ${{ vars.AWS_REGION }}
          environment: ${{ env.ENVIRONMENT }}

      # ── Step 4: Deploy API + Worker with pinned task definitions ──────────
      - name: Deploy API service
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --service "${{ vars.ECS_API_SERVICE }}" \
            --task-definition "${{ steps.api-taskdef.outputs.arn }}" \
            --force-new-deployment \
            --region "${{ vars.AWS_REGION }}"

      - name: Deploy Worker service
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --service "${{ vars.ECS_WORKER_SERVICE }}" \
            --task-definition "${{ steps.worker-taskdef.outputs.arn }}" \
            --force-new-deployment \
            --region "${{ vars.AWS_REGION }}"

      # ── Step 5: Verify API is running the expected image tag ──────────────
      - name: Verify API deployment
        uses: QNSC-VN/qnsc-ci/actions/verify-ecs-deploy@v1
        with:
          cluster:   ${{ vars.ECS_CLUSTER }}
          service:   ${{ vars.ECS_API_SERVICE }}
          image-tag: ${{ env.IMAGE_TAG }}
          region:    ${{ vars.AWS_REGION }}

      # ── Step 6: Health check ──────────────────────────────────────────────
      - name: Post-deploy health check
        if: vars.API_URL != ''
        uses: QNSC-VN/qnsc-ci/actions/post-deploy-health-check@v1
        with:
          url: ${{ vars.API_URL }}/v1/healthz
          timeout-seconds: '120'

      # ── Step 7: Job summary ───────────────────────────────────────────────
      - name: Deployment summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          echo "### Deploy $STATUS — $ENVIRONMENT" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image tag** | \`$IMAGE_TAG\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Actor** | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **API URL** | \`${{ vars.API_URL }}\` |" >> "$GITHUB_STEP_SUMMARY"

      # ── Step 8: Notify Slack / Discord ────────────────────────────────────
      - name: Notify deploy result
        if: always()
        uses: QNSC-VN/qnsc-ci/actions/notify-deploy@v1
        with:
          webhook-url: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
          status: ${{ job.status == 'success' && 'success' || 'failure' }}
          service: rally-api
          environment: ${{ env.ENVIRONMENT }}
          version: ${{ env.IMAGE_TAG }}
