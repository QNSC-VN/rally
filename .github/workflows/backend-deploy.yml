# =============================================================================
# Backend · Deploy — thin caller of the shared reusable (qnsc-ci).
#
# Triggers:
#   develop → push to main (auto)
#   prod    → push a semver tag v*.*.*  (gated by the "production" GitHub
#             Environment's required reviewer, enforced inside the reusable)
#
# The reusable builds/attests on main, promotes the exact dev image on tag,
# migrates, then rolls the ECS services. All ECS_*/RDS/APP_URL config is read
# from env-scoped GitHub vars; only the AWS account id (+ optional Slack webhook)
# are passed explicitly to the reusable (least-privilege, no `secrets: inherit`).
# =============================================================================
name: Backend · Deploy

on:
  push:
    branches: [main]
    # Skip the develop build+deploy when a merge touches ONLY paths this service
    # doesn't ship: docs, infra (own apply flow), and the web app. paths-ignore
    # fires only if EVERY changed file matches — a shared change (libs, db, root
    # lockfile) still deploys, so under-deploy is impossible. Release tags always
    # change package.json + manifest (root, never ignored) → prod never skipped.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.claude/**'
      - 'infra/**'
      - 'apps/web/**'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # semver only — no -rc suffix

concurrency:
  # Serialize by ENVIRONMENT, not raw ref: all prod (tag) deploys share one
  # group so prod DB migrations never run concurrently; develop shares another.
  # prod and develop still run in parallel (different groups).
  group: deploy-backend-${{ startsWith(github.ref, 'refs/tags/') && 'prod' || 'develop' }}
  cancel-in-progress: false   # never cancel a running deploy

jobs:
  deploy:
    uses: QNSC-VN/qnsc-ci/.github/workflows/backend-deploy.yml@v1.3.3
    with:
      product: rally
      has_worker: true
      has_migrator: true
    # Least-privilege: pass only what the reusable declares (no `secrets: inherit`).
    secrets:
      AWS_ACCOUNT_ID:       ${{ vars.AWS_ACCOUNT_ID }}
      SLACK_DEPLOY_WEBHOOK: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
