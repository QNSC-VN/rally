# =============================================================================
# Infrastructure · Plan — thin caller of the shared reusable (qnsc-ci).
# Dry-run on every PR touching infra/live/**; posts a plan comment per changed
# workspace and gates on `tofu fmt`.
# =============================================================================
name: Infrastructure · Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/live/**"
      - ".github/workflows/infra-plan.yml"

# Granted at the caller so the reusable can request them (a reusable workflow
# can never exceed the caller's token). id-token:write is mandatory for the
# OIDC AssumeRole; without an explicit grant it defaults to `none` and GitHub
# rejects the whole workflow at compile time ("0 jobs" run failure).
permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    uses: QNSC-VN/qnsc-ci/.github/workflows/infra-plan.yml@v1.3.0
    with:
      product: rally
    secrets:
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      # Mirror the apply-time TF_VARs so plan ≈ apply (masked inside the reusable).
      tf_secret_vars_json: |
        {
          "cloudflare_api_token": "${{ secrets.CLOUDFLARE_API_TOKEN }}"
        }
