# =============================================================================
# Create Release — thin caller over the shared reusable release-please workflow.
# Logic lives in QNSC-VN/qnsc-ci/.github/workflows/release-please.yml.
# The release-please-config.json stays product-local (this repo's root).
#
# Requires: RELEASE_BOT_APP_ID (var) + RELEASE_BOT_PRIVATE_KEY (secret).
# On merge of the release PR, the vX.Y.Z tag triggers the prod deploy.
# =============================================================================
name: Create Release

on:
  push:
    branches: [main]

concurrency:
  group: release-please
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    uses: QNSC-VN/qnsc-ci/.github/workflows/release-please.yml@v1
    secrets: inherit
