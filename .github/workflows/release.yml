# =============================================================================
# Release Please — auto-creates a "chore(release): vX.Y.Z" PR on every
# main push, then auto-tags when that PR is merged.
# The tag triggers backend-deploy.yml (prod deploy with approval gate).
#
# Delegates to the shared reusable workflow in qnsc-ci so release logic stays
# DRY across products. RELEASE_BOT_APP_ID (org var) is read automatically;
# RELEASE_BOT_PRIVATE_KEY (org secret) is passed explicitly below.
# =============================================================================
name: Create Release

on:
  push:
    branches: [main]

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release:
    uses: QNSC-VN/qnsc-ci/.github/workflows/release-please.yml@v1
    secrets:
      RELEASE_BOT_PRIVATE_KEY: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
