# =============================================================================
# CI — fast quality gates on every PR and push to main
# Gate: lint → typecheck → unit tests → e2e tests → docker build → openapi diff
# Security scans live in the Security · Scan workflow — independently runnable.
# =============================================================================
name: Backend · CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: ci-backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read  # required by amannn/action-semantic-pull-request
  packages: read       # pull @qnsc-vn/* from GitHub Packages

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.2'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Lint + typecheck (fast gate — no DB needed)
  # ─────────────────────────────────────────────────────────────────────────
  quality:
    name: Lint & typecheck
    # A PR title/body edit fires pull_request:edited — only pr-title needs that.
    # Skip the heavy gates on edited; build/openapi cascade-skip via `needs`.
    if: github.event.action != 'edited'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Authenticates pnpm against GitHub Packages for @qnsc-vn/* (see .npmrc).
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - uses: QNSC-VN/qnsc-ci/actions/setup-node-pnpm@v1.3.3
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: npx tsc -p tsconfig.build.json --noEmit

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Unit + e2e tests (needs Postgres + Redis)
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Tests
    if: github.event.action != 'edited'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Authenticates pnpm against GitHub Packages for @qnsc-vn/* (see .npmrc).
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rally_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - uses: QNSC-VN/qnsc-ci/actions/setup-node-pnpm@v1.3.3
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      # Generate a fresh ephemeral EC P-256 keypair for tests (matches ES256 in platform.module.ts).
      # No stored secret needed — keys are test-only, discarded after the run.
      - name: Generate CI JWT keypair
        id: jwt
        run: |
          node - << 'EOF'
          const { generateKeyPairSync } = require('crypto');
          const { privateKey, publicKey } = generateKeyPairSync('ec', {
            namedCurve: 'P-256',
            privateKeyEncoding: { type: 'pkcs8', format: 'pem' },
            publicKeyEncoding:  { type: 'spki',  format: 'pem' },
          });
          const b64 = (s) => Buffer.from(s).toString('base64');
          const fs  = require('fs');
          fs.appendFileSync(process.env.GITHUB_ENV,
            `CI_JWT_PRIVATE_KEY=${b64(privateKey)}\nCI_JWT_PUBLIC_KEY=${b64(publicKey)}\n`);
          EOF

      - name: Run migrations
        run: pnpm db:migrate
        env:
          DATABASE_MIGRATION_URL: postgresql://postgres:postgres@localhost:5432/rally_test?sslmode=disable
          # db:migrate also runs seedTenantBootstrap, which only creates the
          # primary Entra SSO connection when ENTRA_TENANT_ID is set. The SSO
          # → RBAC e2e (test/e2e/sso-rbac.e2e.spec.ts) needs that connection to
          # resolve a workspace, so seed it here. Values mirror .env.
          ENTRA_TENANT_ID: dev-tenant
          SSO_ALLOWED_EMAIL_DOMAINS: qnsc.vn

      - name: Unit tests (with coverage)
        run: pnpm test:cov
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rally_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
          JWT_PRIVATE_KEY: ${{ env.CI_JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ env.CI_JWT_PUBLIC_KEY }}
          JWT_ISSUER: rally-api
          JWT_AUDIENCE: rally-web
          JWT_ACCESS_EXPIRY: 15m
          JWT_REFRESH_EXPIRY: 30d
          CSRF_SECRET: ci-test-csrf-secret-min-32-characters-ok

      - name: E2E tests
        run: pnpm test:e2e
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rally_test?sslmode=disable
          DATABASE_MIGRATION_URL: postgresql://postgres:postgres@localhost:5432/rally_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
          JWT_PRIVATE_KEY: ${{ env.CI_JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ env.CI_JWT_PUBLIC_KEY }}
          JWT_ISSUER: rally-api
          JWT_AUDIENCE: rally-web
          JWT_ACCESS_EXPIRY: 15m
          JWT_REFRESH_EXPIRY: 30d
          CSRF_SECRET: ci-test-csrf-secret-min-32-characters-ok
          # Entra BFF OIDC — CI test-only placeholders (never used for real auth).
          # ENTRA_TENANT_ID matches the SSO connection seeded during migrations so
          # the SSO → RBAC e2e resolves its workspace; PLATFORM_ADMIN_EMAILS drives
          # the admin-elevation assertion. Both mirror .env.
          ENTRA_TENANT_ID: dev-tenant
          ENTRA_CLIENT_ID: ci-test-client
          ENTRA_CLIENT_SECRET: ci-test-secret
          ENTRA_REDIRECT_URI: http://localhost:3000/v1/bff/callback
          SSO_ALLOWED_EMAIL_DOMAINS: qnsc.vn
          PLATFORM_ADMIN_EMAILS: nghiavt@qnsc.vn

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Migration upgrade path — proves new migrations apply on top of an
  #    EXISTING (main) database, i.e. the real path develop/prod take.
  #
  #    The `test` job migrates a FRESH, empty DB. That can never catch a whole
  #    class of failures — most notably `ALTER TYPE … ADD VALUE` followed by a
  #    use of that value in the same batch: on an empty DB the enum type is
  #    CREATEd in the same transaction, which Postgres permits; on a real DB the
  #    type is already committed, so the same batch aborts with 55P04. Drizzle
  #    runs all pending migrations in one transaction, so this bites every
  #    incremental deploy but stays invisible to a from-scratch test.
  #
  #    Strategy: apply main's migrations first and COMMIT them (baseline), then
  #    apply only the migrations this PR adds on top. A migration that can't
  #    upgrade a prod-like database fails here — before it can reach main.
  # ─────────────────────────────────────────────────────────────────────────
  migrations:
    name: Migration upgrade path
    if: github.event.action != 'edited'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DATABASE_MIGRATION_URL: postgresql://postgres:postgres@localhost:5432/rally_upgrade?sslmode=disable

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rally_upgrade
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0  # need origin/main to build the baseline schema

      # Expand-contract advisory (WARN-only): migrate-before-flip runs the new
      # migration while the OLD app is briefly still live, so backward-
      # incompatible DDL (drop/rename/narrow a column) can break it. Flag such
      # DDL in this PR's new migration lines via GHA annotations — never fails
      # the build. Acknowledge a deliberate one with a trailing
      # `-- expand-contract-ok: <reason>` on the line.
      # TODO: flip to blocking before the first production project goes live.
      - name: Expand-contract advisory
        if: github.event_name == 'pull_request'
        run: |
          added=$(git diff origin/main...HEAD -- 'db/migrations/*.sql' \
            | grep -E '^\+' | grep -vE '^\+\+\+' || true)
          if [ -z "$added" ]; then echo "No new migration lines."; exit 0; fi
          pattern='DROP[[:space:]]+COLUMN|DROP[[:space:]]+TABLE|RENAME[[:space:]]+(COLUMN|TO)|SET[[:space:]]+NOT[[:space:]]+NULL'
          hits=$(echo "$added" | grep -iE "$pattern" | grep -iv 'expand-contract-ok' || true)
          if [ -n "$hits" ]; then
            echo "$hits" | while IFS= read -r line; do
              echo "::warning title=Expand-contract::Backward-incompatible DDL — verify migrate-before-flip safe: ${line#+}"
            done
          else
            echo "No backward-incompatible DDL detected."
          fi

      - uses: QNSC-VN/qnsc-ci/actions/setup-node-pnpm@v1.3.3
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      # Baseline: swap in main's migration files, apply + COMMIT them so the DB
      # mirrors a real deployed environment, then restore this PR's files.
      # (On push-to-main this is a no-op: origin/main == HEAD.)
      - name: Apply baseline (main) migrations
        run: |
          git checkout origin/main -- db/migrations
          pnpm db:migrate
          git checkout HEAD -- db/migrations

      # Upgrade: apply only the migrations this PR adds, on the committed
      # baseline. Reproduces the committed-enum restriction and any other
      # incremental-only hazard; fails the PR if the upgrade can't complete.
      - name: Apply new migrations on top of baseline
        run: pnpm db:migrate

  # ─────────────────────────────────────────────────────────────────────────
  # 4. Docker build validation (BuildKit cache, no push)
  #    Runs after tests to avoid wasting compute on broken code.
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [quality, test]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4

      # Build all three targets — fail fast if any stage breaks.
      - name: Build api image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: .
          target: api
          push: false
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          # BuildKit secret consumed by the deps/prod-deps stages to auth
          # pnpm against GitHub Packages for @qnsc-vn/* (never baked into a layer).
          secrets: |
            node_auth_token=${{ secrets.GITHUB_TOKEN }}

      - name: Build migrator image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: .
          target: migrator
          push: false
          cache-from: type=gha,scope=migrator
          cache-to: type=gha,mode=max,scope=migrator
          secrets: |
            node_auth_token=${{ secrets.GITHUB_TOKEN }}

      - name: Build worker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: .
          target: worker
          push: false
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
          secrets: |
            node_auth_token=${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # 4. OpenAPI spec — generate and check for breaking changes on PRs.
  #    Publishes the spec as an artifact so the FE repo can download it.
  # ─────────────────────────────────────────────────────────────────────────
  openapi:
    name: OpenAPI contract
    runs-on: ubuntu-latest
    needs: [quality]
    timeout-minutes: 20
    env:
      # Authenticates pnpm against GitHub Packages for @qnsc-vn/* (see .npmrc).
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rally_openapi
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-retries 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          # Fetch full history so we can compare against the base branch
          fetch-depth: 0

      - uses: QNSC-VN/qnsc-ci/actions/setup-node-pnpm@v1.3.3
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Generate ephemeral JWT keys
        run: |
          node - << 'EOF'
          const { generateKeyPairSync } = require('crypto');
          const { privateKey, publicKey } = generateKeyPairSync('ec', {
            namedCurve: 'P-256',
            privateKeyEncoding: { type: 'pkcs8', format: 'pem' },
            publicKeyEncoding:  { type: 'spki',  format: 'pem' },
          });
          const b64 = (s) => Buffer.from(s).toString('base64');
          const fs  = require('fs');
          fs.appendFileSync(process.env.GITHUB_ENV,
            `CI_JWT_PRIVATE_KEY=${b64(privateKey)}\nCI_JWT_PUBLIC_KEY=${b64(publicKey)}\n`);
          EOF

      - name: Run migrations
        run: pnpm db:migrate
        env:
          DATABASE_MIGRATION_URL: postgresql://postgres:postgres@localhost:5432/rally_openapi?sslmode=disable

      - name: Build app
        run: pnpm build:api

      - name: Start API and capture OpenAPI spec
        run: |
          node dist/apps/api/apps/api/src/main.js &
          API_PID=$!
          echo "API_PID=$API_PID" >> "$GITHUB_ENV"
          # Wait for the API to be ready (up to 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/v1/healthz > /dev/null 2>&1; then
              echo "API ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:3000/api/docs-json -o openapi.json
          kill $API_PID 2>/dev/null || true
        env:
          NODE_ENV: development
          PORT: 3000
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rally_openapi?sslmode=disable
          REDIS_URL: redis://localhost:6379
          JWT_PRIVATE_KEY: ${{ env.CI_JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ env.CI_JWT_PUBLIC_KEY }}
          JWT_ISSUER: rally-api
          JWT_AUDIENCE: rally-web
          JWT_ACCESS_EXPIRY: 15m
          JWT_REFRESH_EXPIRY: 30d
          CSRF_SECRET: ci-test-csrf-secret-min-32-characters-ok
          OTEL_ENABLED: 'false'
          RESILIENCE_ENABLED: 'false'
          # Entra BFF OIDC — CI test-only placeholders (never used for real auth).
          ENTRA_TENANT_ID: ci-test-tenant
          ENTRA_CLIENT_ID: ci-test-client
          ENTRA_CLIENT_SECRET: ci-test-secret
          ENTRA_REDIRECT_URI: http://localhost:3000/v1/bff/callback

      - name: Upload OpenAPI spec artifact
        uses: QNSC-VN/qnsc-ci/actions/publish-openapi-spec@v1.3.3
        with:
          spec-path: openapi.json
          artifact-name: openapi-spec-${{ github.sha }}
          retention-days: "30"

      # On PRs: download the base-branch spec and diff for breaking changes.
      - name: Download base spec
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151  # v21
        continue-on-error: true   # first PR has no base artifact yet
        with:
          workflow: ci.yml
          branch: ${{ github.base_ref }}
          name: openapi-spec-${{ github.event.pull_request.base.sha }}
          path: base-spec/

      - name: Breaking change check
        if: github.event_name == 'pull_request'
        uses: QNSC-VN/qnsc-ci/actions/validate-openapi-contract@v1.3.3
        with:
          current-spec-path: openapi.json
          base-spec-path: base-spec/openapi.json
          fail-on-breaking: "true"

  # ─────────────────────────────────────────────────────────────────────────
  # 5. PR title lint — enforce Conventional Commits format on the PR title.
  #    Release Please reads PR titles to generate changelogs, so this gate
  #    ensures the title is machine-readable before the PR can merge.
  # ─────────────────────────────────────────────────────────────────────────
  pr-title:
    name: PR title (conventional commits)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50  # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            style
            refactor
            perf
            security
            test
            build
            ci
            deps
            revert
          # Require scope for security and feat changes — e.g. feat(auth): ...
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" must start with a lowercase letter.

  # Security scans (Trivy, CodeQL) → security.yml
