# Rally monorepo — pnpm workspace.
# The NestJS backend (apps/api, apps/worker, libs, db) is the ROOT package
# (resolved via nest-cli.json + tsconfig paths, NestJS-monorepo style).
# apps/web is a separate package (Vite SPA) and the only additional member.
packages:
  - "apps/web"
allowBuilds:
  '@scarf/scarf': true
  '@swc/core': true
  argon2: true
  cpu-features: true
  esbuild: true
  msw: true
  protobufjs: true
  ssh2: true
  unrs-resolver: true
onlyBuiltDependencies:
  - '@scarf/scarf'
  - '@swc/core'
  - argon2
  - cpu-features
  - esbuild
  - msw
  - protobufjs
  - ssh2
  - unrs-resolver
