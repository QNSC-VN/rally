# Rally monorepo — pnpm workspace.
# The NestJS backend (apps/api, apps/worker, libs, db) is the ROOT package
# (resolved via nest-cli.json + tsconfig paths, NestJS-monorepo style).
# apps/web is a separate package (Vite SPA) and the only additional member.
packages:
  - "apps/web"
# Moved from package.json's "pnpm.overrides" — pnpm 11 no longer reads that
# field (silently ignored, see `pnpm install`'s own warning). Without this,
# @nestjs/platform-fastify's own fastify@5.8.5 dependency and the app's direct
# fastify@^5.10.0 resolve to two separate copies in node_modules, so every
# @fastify/* plugin (typed against 5.10.0) fails to structurally match the
# FastifyInstance type NestFastifyApplication exposes (typed against 5.8.5) —
# this is what broke `nest start --watch`'s type-check entirely.
overrides:
  fastify: "5.10.0"
  "esbuild@<0.25.0": ">=0.25.0"
  "brace-expansion@1": "^1.1.16"
  "brace-expansion@2": "^2.1.2"
  "brace-expansion@5": "^5.0.7"
  "js-yaml@4": "^4.3.0"
  # GHSA-c96f-x56v-gq3h — HIGH "DDoS with HTTP2", fixed in 9.7.0. Transitive
  # via fastify@5.10.0 / @nestjs/platform-fastify (declared range ^9.6.0, so
  # 9.7.0 is in-range). A newly published advisory that also affects main.
  "find-my-way@<9.7.0": "9.7.0"
  # GHSA-4c8g-83qw-93j6 — host confusion via failed IDN canonicalization,
  # fixed in 3.1.3. Only reachable as a deep transitive dep (ajv-formats →
  # fast-json-stringify → fastify's ecosystem), so pinned via override rather
  # than a direct package.json dependency bump.
  "fast-uri@<3.1.3": "^3.1.4"
allowBuilds:
  '@scarf/scarf': set this to true or false
  '@swc/core': set this to true or false
  argon2: set this to true or false
  cpu-features: set this to true or false
  esbuild: set this to true or false
  msw: set this to true or false
  protobufjs: set this to true or false
  ssh2: set this to true or false
  unrs-resolver: set this to true or false
onlyBuiltDependencies:
  - '@scarf/scarf'
  - '@swc/core'
  - argon2
  - cpu-features
  - esbuild
  - msw
  - protobufjs
  - ssh2
  - unrs-resolver
