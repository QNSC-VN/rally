<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rally</title>

    <!-- Security: prevent search-engine indexing of this internal app -->
    <meta name="robots" content="noindex, nofollow" />

    <!-- Security: referrer policy — don't leak URL to third-party resources -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Security: Content Security Policy (tightened at CDN/server for prod; meta tag as baseline) -->
    <!-- NOTE: frame-ancestors and X-Frame-Options MUST be set as HTTP headers — not meta tags.    -->
    <!-- In production, configure these at the reverse-proxy / CDN layer.                          -->
    <!--                                                                                            -->
    <!-- *.r2.cloudflarestorage.com is required for attachments. Uploads go DIRECTLY from the       -->
    <!-- browser to the bucket via a presigned PUT (bytes never touch the API), and downloads       -->
    <!-- follow a 302 from /v1/.../content to a presigned GET on that same host. Without it,        -->
    <!-- every upload fails with an opaque "Failed to fetch" — the request is blocked before        -->
    <!-- dispatch, so nothing reaches the network tab and the server logs stay clean.               -->
    <!-- Listed in img-src too: a redirect target is re-checked, so inline <img> rendering of an    -->
    <!-- attachment needs it as well.                                                               -->
    <!--                                                                                            -->
    <!-- connect-src needs blob: too, for the SAME "opaque Failed to fetch" reason: pasting an      -->
    <!-- image into a rich-text field creates a local URL.createObjectURL() preview (no network     -->
    <!-- call), and uploading it for real on Save does `fetch(blobUrl)` to read those bytes back     -->
    <!-- out before POSTing them through the normal attachment pipeline. Without this, that fetch    -->
    <!-- is blocked before dispatch — the Save button just silently never clears.                    -->
    <!--                                                                                            -->
    <!-- localhost:4566 is LocalStack, the local dev stand-in for R2 (see docker-compose.yml /      -->
    <!-- STORAGE_ENDPOINT). STORAGE_FORCE_PATH_STYLE=true makes presigned PUT/GET URLs use           -->
    <!-- path-style addressing (localhost:4566/bucket/key, bare host, no subdomain) rather than      -->
    <!-- virtual-hosted-style — LocalStack 403s virtual-hosted-style requests outright before CORS   -->
    <!-- even applies, so this must be the bare host, not a *.localhost:4566 wildcard. This is       -->
    <!-- dev-only baseline — prod tightens the policy at the CDN and never talks to LocalStack.       -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com data:;
        img-src 'self' data: blob: https://*.r2.cloudflarestorage.com http://localhost:4566;
        connect-src 'self'
          blob:
          http://localhost:3000
          http://localhost:4566
          https://*.qnsc.vn
          https://*.r2.cloudflarestorage.com
          https://login.microsoftonline.com
          https://login.microsoft.com
          https://graph.microsoft.com;
        worker-src blob:;
        base-uri 'self';
        form-action 'self' https://login.microsoftonline.com;
      "
    />

    <!-- Branding: theme color for browser chrome -->
    <meta name="theme-color" content="#1d3f73" />

    <!-- Performance: preconnect to API origin -->
    <link rel="preconnect" href="http://localhost:3000" />
  </head>
  <body>
    <!-- Accessibility: skip-to-content landmark (styled via globals.css) -->
    <a href="#main-content" class="skip-nav">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
